# =========================================
# 몽글픽 추천 서비스 CI/CD 워크플로우
# =========================================
# PR/push → pytest 테스트 (GitHub 호스팅 러너, SQLite 인메모리)
# develop push → 스테이징 맥북에서 직접 배포 (Self-hosted 러너)
#
# 사전 준비:
#   스테이징 맥북에 GitHub Actions self-hosted runner 설치 완료

name: CI/CD

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── CI: 테스트 (GitHub 호스팅 러너) ───
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # uv 설치 — monglepick-recommend 는 uv 단일 패키지 매니저 사용 (requirements.txt 미사용)
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install dependencies
        # --frozen: uv.lock 진실원본 강제. dev 의존성(pytest/pytest-asyncio/aiosqlite/httpx) 은 pyproject 에 이미 포함됨.
        run: uv sync --frozen

      - name: Test
        env:
          # 테스트용 더미 값 (실제 DB/Redis 미사용 — conftest에서 SQLite/FakeRedis로 오버라이드)
          APP_NAME: monglepick-recommend
          APP_VERSION: 0.1.0
          DEBUG: "true"
          API_V1_PREFIX: /api/v1
          DB_HOST: 127.0.0.1
          DB_PORT: "3306"
          DB_NAME: test_db
          DB_USERNAME: test_user
          DB_PASSWORD: test_password
          REDIS_HOST: localhost
          REDIS_PORT: "6379"
          REDIS_DB: "1"
          JWT_SECRET: ci-test-jwt-secret-not-for-production-use-only
          JWT_ALGORITHM: HS256
          SERVER_HOST: 0.0.0.0
          SERVER_PORT: "8001"
          CORS_ORIGINS: http://localhost:3000,http://localhost:5173
          TMDB_IMAGE_BASE_URL: https://image.tmdb.org/t/p/w500
        # uv 가상환경 내 pytest 실행 (.venv 경로 해석 자동 처리)
        run: uv run pytest tests/ -v --tb=short -q

  # ─── CD: 스테이징 배포 (Self-hosted 러너에서 직접 실행) ───
  deploy:
    name: Deploy to Staging
    needs: test
    runs-on: self-hosted
    timeout-minutes: 10
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy Recommend container
        run: |
          set -e
          echo "========== Recommend 배포 시작 =========="

          PROJECT_DIR="${PROJECT_DIR:-/Users/yoonhyungjoo/Documents/monglepick}"

          # checkout된 코드를 프로젝트 디렉토리에 동기화
          rsync -a --delete --exclude='.venv' --exclude='__pycache__' --exclude='.env' \
            "$GITHUB_WORKSPACE/" "$PROJECT_DIR/monglepick-recommend/"

          cd "$PROJECT_DIR"

          # Recommend 컨테이너만 재빌드 + 재시작
          docker compose -f docker-compose.staging.yml up -d --build --no-deps recommend

          # 헬스체크 대기 (최대 25초)
          echo ">>> Recommend 헬스체크 대기..."
          for i in 1 2 3 4 5; do
            if curl -sf "http://localhost:8001/health" > /dev/null 2>&1; then
              echo "  ✅ Recommend OK"
              break
            fi
            echo "  ⏳ Recommend starting... ($i/5)"
            sleep 5
          done

          echo "========== ✅ Recommend 배포 완료 =========="
